<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations Intake | FedEngine</title>
    
    <!-- Step out to load the core chassis styling -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="dono.css">
    <link rel="manifest" href="../manifest.json">
</head>
<body>
    <div class="terminal-container">
        <header class="terminal-header">
            <p>SYS.DONO :: INTAKE</p>
            <p>STATUS: AWAITING ITEM</p>
        </header>

        <main class="grid-container">
            <!-- Data Entry Form -->
            <form id="dono-form" class="industrial-form">
                <div class="form-group">
                    <label>ITEM DESCRIPTION</label>
                    <input type="text" id="item-desc" required autocomplete="off" placeholder="SCAN OR TYPE DESC">
                </div>

                <div class="form-group">
                    <label>CATEGORY</label>
                    <select id="item-category" required>
                        <option value="" disabled selected>-- SELECT CLASS --</option>
                        <option value="apparel">APPAREL</option>
                        <option value="electronics">ELECTRONICS</option>
                        <option value="homegoods">HOME GOODS</option>
                        <option value="media">MEDIA</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>CONDITION</label>
                    <select id="item-condition" required>
                        <option value="" disabled selected>-- SELECT CONDITION --</option>
                        <option value="new">NEW / MINT</option>
                        <option value="good">GOOD / FUNCTIONAL</option>
                        <option value="fair">FAIR / WORN</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>ROUTING DESTINATION</label>
                    <select id="item-destination" required>
                        <option value="" disabled selected>-- SELECT ROUTE --</option>
                        <option value="bag_tag">04 - BAG & TAG (FLOOR)</option>
                        <option value="ecom_tote">07 - eCOM TOTE</option>
                    </select>
                </div>

                <button type="submit" class="macro-key action-key">LOG ITEM</button>
            </form>
        </main>

        <footer class="action-footer">
            <button class="aux-key" id="btn-back">RETURN MAIN</button>
            <button class="aux-key warning-key" id="btn-estop">E-STOP / LOGOUT</button>
        </footer>
    </div>

    <!-- Core Engine & Local Logic -->
    <script src="../script.js" type="module"></script>
    <script src="dono.js" type="module"></script>
</body>
</html>
