<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intranet Terminal | Federation Swift Thrift</title>
    <link rel="stylesheet" href="../style.css">

    <link rel="manifest" href="../manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#1c1e1f">
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker Operational:', reg.scope))
            .catch(err => console.error('Service Worker Fault:', err));
        });
    }
    </script>
</head>
<body>
    <div class="terminal-chassis">
        <header class="digital-display">
            <h1>INTRANET :: HOME</h1>
            <div class="status-indicator">STATUS: ONLINE</div>
        </header>


        <main class="control-grid">
            <button class="macro-key">
                <span class="key-id">01</span>
                <span class="key-label">Self Check Out</span>
            </button>
            <button class="macro-key">
                <span class="key-id">02</span>
                <span class="key-label">Customer Support</span> <!-- Returns and Refunds, Create or update Accounts, reprint reciepts -->
            </button>
            <button class="macro-key" id="btn-dono">
                <span class="key-id">03</span>
                <span class="key-label">Donations</span>
            </button>
            <button class="macro-key" id="btn-bagtag">
                <span class="key-id">04</span>
                <span class="key-label">Bagging & Tagging</span>
            </button>
            <button class="macro-key">
                <span class="key-id">05</span>
                <span class="key-label">Swift Thrift</span>
            </button>
            <button class="macro-key">
                <span class="key-id">06</span>
                <span class="key-label">Ship/Recieve</span>
            </button>
            <button class="macro-key" id="btn-ecom">
                <span class="key-id">07</span>
                <span class="key-label">ECOMMERCE</span>
            </button>
            <button class="macro-key">
                <span class="key-id">08</span>
                <span class="key-label">Time & Pay</span>  
            </button>
        </main>


        <footer class="action-footer">
            <button class="aux-key">Management</button>
            <button class="aux-key">User Profile</button>
            <button class="aux-key warning-key" id="btn-estop">E-STOP / LOGOUT</button>
        </footer>
    </div>
    <script src="../script.js" type="module"></script>
    <script src="home.js" type="module"></script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            // Added ../ to step out of 00-Main and find sw.js in the root
            navigator.serviceWorker.register('../sw.js')
                .then(reg => console.log('Service Worker Operational:', reg.scope))
                .catch(err => console.error('Service Worker Fault:', err));
        });
    }
    </script>
</body>
</html>
