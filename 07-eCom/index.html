<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCommerce Operations | FedEngine</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="ecom.css">
    <link rel="manifest" href="../manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <div class="terminal-container no-print">
        <header class="terminal-header">
            <p>SYS.ECOM :: LOGISTICS HUB</p>
            <div id="status-indicator">MODE: DRAFTING</div>
        </header>

        <nav class="action-footer" style="margin-top: 0; margin-bottom: 20px; border-top: none; border-bottom: 6px groove var(--shadow-dark); padding-bottom: 20px;">
            <button id="tab-draft" class="aux-key active-mode">1. LIST ITEMS</button>
            <button id="tab-fulfill" class="aux-key">2. FULFILLMENT</button>
            <button id="tab-history" class="aux-key">3. HISTORY</button>
        </nav>

        <main class="grid-container" style="overflow-y: auto; max-height: 55vh;">
            
            <section id="view-draft">
                <form id="ecom-form" class="industrial-form">
                    <div class="form-group">
                        <label>E-COM INTAKE QUEUE</label>
                        <select id="pending-queue" required>
                            <option value="" disabled selected>-- LOADING E-COM QUEUE... --</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group" style="flex: 2;">
                            <label>PRODUCT TITLE</label>
                            <input type="text" id="prod-title" required autocomplete="off" placeholder="WEB DISPLAY TITLE">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>PRICE ($)</label>
                            <input type="number" id="prod-price" required step="0.01" placeholder="0.00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>WEB DESCRIPTION</label>
                        <textarea id="prod-desc" required rows="3" placeholder="ENTER DETAILED CONDITION AND SPECS FOR ONLINE SHOPPERS..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group half-width">
                            <label>UPLOAD IMAGES (MAX 5)</label>
                            <input type="file" id="prod-photos" accept="image/*" multiple required>
                        </div>
                        <div class="form-group half-width">
                            <label>STAGING TOTE ID</label>
                            <input type="text" id="staging-tote" required placeholder="SCAN/ENTER TOTE ID">
                        </div>
                    </div>

                    <button type="submit" class="macro-key action-key">PUBLISH TO WEB & PRINT A2 TAG</button>
                </form>
            </section>

            <section id="view-fulfill" class="hidden">
                <div class="industrial-panel">
                    <h2 class="panel-title">AWAITING SHIPMENT</h2>
                    <div id="fulfillment-list" class="order-grid">
                        <div class="system-message">AWAITING FRONT-END STORE CONNECTION...</div>
                    </div>
                    
                    <form id="fulfillment-form" class="industrial-form" style="margin-top: 20px;">
                        <div class="form-group">
                            <label>LOG TRACKING NUMBER (PIRATESHIP)</label>
                            <input type="text" id="tracking-number" placeholder="SCAN SHIPPING LABEL BARCODE">
                        </div>
                        <button type="button" id="btn-mark-shipped" class="macro-key action-key">MARK ORDER SHIPPED</button>
                    </form>
                </div>
            </section>

            <section id="view-history" class="hidden">
                <div class="industrial-panel">
                    <h2 class="panel-title">SHIPPED MANIFESTS</h2>
                    <div class="form-group" style="margin-bottom: 15px;">
                        <input type="text" id="search-history" placeholder="SEARCH BY ORDER ID OR TRACKING...">
                    </div>
                    <div id="history-list" class="order-grid">
                        <div class="system-message">NO PAST ORDERS FOUND.</div>
                    </div>
                </div>
            </section>

        </main>

        <footer class="action-footer">
            <button class="aux-key" id="btn-back">RETURN MAIN</button>
            <button class="aux-key warning-key" id="btn-estop">E-STOP / LOGOUT</button>
        </footer>
    </div>

    <div id="print-zone" class="print-only"></div>

    <script src="../script.js" type="module"></script>
    <script src="ecom.js" type="module"></script>
</body>
</html>
